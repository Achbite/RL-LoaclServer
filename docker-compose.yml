# ============================================================================
# 迷宫训练框架 - Docker Compose 编排（开发模式）
# 用法：
#   AIServer：    docker compose up -d maze-aiserver（后台启动）
#   TrainClient： docker compose run --rm maze-client bash（交互式）
#   Learner：     docker compose up -d maze-learner（后台启动）
# ============================================================================

services:
  # ---- TrainClient：迷宫环境模拟器 ----
  maze-client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: maze-client
    volumes:
      - .:/workspace                    # 源码 bind mount
    working_dir: /workspace/TrainClient  # 进入容器即在 TrainClient 目录
    networks:
      - maze-net
    ports:
      - "9001:9001"                     # Client 预留端口
      - "9004:9004"                     # 可视化 HTTP 服务端口
    stdin_open: true                     # 保持 stdin 打开（交互式 bash）
    tty: true                            # 分配伪终端

  # ---- AIServer：AI 决策服务 ----
  maze-aiserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.aiserver
    container_name: maze-aiserver
    volumes:
      - .:/workspace
      - ./RL-Learner/models/p2p:/workspace/AIServer/models/p2p    # Learner P2P 模型 → AIServer P2P 目录（只读共享）
    working_dir: /workspace/AIServer    # 进入容器即在 AIServer 目录
    networks:
      - maze-net
    ports:
      - "9002:9002"                     # gRPC 端口（Client → AIServer）
    stdin_open: true
    tty: true
    command: ["bash", "-c", "echo 'AIServer 容器已就绪' && sleep infinity"]

  # ---- TrainClient 并行训练模式 ----
  maze-train:
    build:
      context: .
      dockerfile: docker/Dockerfile.client    # 复用 TrainClient 镜像（同一套 C++ 工具链）
    container_name: maze-train
    volumes:
      - .:/workspace
    working_dir: /workspace/TrainClient
    networks:
      - maze-net
    ports:
      - "9004:9004"                     # 可视化 HTTP 服务端口
    stdin_open: true
    tty: true

  # ---- Learner：强化学习训练器 ----
  maze-learner:
    build:
      context: .
      dockerfile: docker/Dockerfile.learner
    container_name: maze-learner
    volumes:
      - .:/workspace                    # 源码 bind mount（models/ 直接写入宿主机项目目录）
    working_dir: /workspace/RL-Learner
    networks:
      - maze-net
    ports:
      - "9003:9003"                     # Learner gRPC 端口
      - "9005:9005"                     # 训练指标面板端口
    stdin_open: true
    tty: true
    command: ["bash", "-c", "echo 'Learner 容器已就绪' && sleep infinity"]

# ---- 网络 ----
networks:
  maze-net:
    driver: bridge

# ---- 共享卷（已移除 model-data，改用 bind mount 直接映射宿主机目录）----
volumes: {}
